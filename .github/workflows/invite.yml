name: Auto Invite to Org
on:
  issues:
    types: [opened]

jobs:
  invite:
    runs-on: ubuntu-latest
    steps:
      - name: Invite user to org
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_INVITE_TOKEN }}
          script: |
            const username = context.payload.issue.user.login;
            const org = context.repo.owner;

            try {
              const membership = await github.rest.orgs.getMembershipForUser({ org, username });
              if (membership.data.state === 'active') {
                await github.rest.issues.createComment({
                  owner: org, repo: context.repo.repo, issue_number: context.issue.number,
                  body: `👋 @${username} You're already a member of **${org}**! Go create issues on [go-hello](https://github.com/${org}/go-hello/issues) or [python-app](https://github.com/${org}/python-app/issues) and comment \`/fs-triage\` to try the agents.`
                });
                await github.rest.issues.update({ owner: org, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed' });
                return;
              }
            } catch (e) {
              // Not a member — continue to invite
            }

            try {
              const userRes = await github.rest.users.getByUsername({ username });
              await github.rest.orgs.createInvitation({
                org,
                invitee_id: userRes.data.id,
                role: 'direct_member'
              });

              await github.rest.issues.createComment({
                owner: org, repo: context.repo.repo, issue_number: context.issue.number,
                body: `✅ @${username} You've been invited to **${org}**!\n\n**Next steps:**\n1. Accept your invite → https://github.com/orgs/${org}/invitation\n2. Then go try fullsend agents:\n   - [go-hello issues](https://github.com/${org}/go-hello/issues/new) — comment \`/fs-triage\`\n   - [python-app issues](https://github.com/${org}/python-app/issues/new) — comment \`/fs-code\``
              });
            } catch (error) {
              await github.rest.issues.createComment({
                owner: org, repo: context.repo.repo, issue_number: context.issue.number,
                body: `❌ @${username} Something went wrong: ${error.message}\n\nAsk the presenter to invite you manually.`
              });
            }

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
